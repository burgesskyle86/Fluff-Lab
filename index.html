<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fluff Lab v1.4</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>Fluff Lab</h1>
        <p>Protein dessert builder</p>
      </div>
      <span class="version">v1.4</span>
    </header>

    <section class="card hero">
      <label for="flavorSelect">Flavor</label>
      <select id="flavorSelect"></select>

      <div class="totals">
        <div class="total-box">
          <div id="caloriesTotal" class="total-number">0</div>
          <div class="total-label">Calories</div>
        </div>
        <div class="total-box">
          <div id="proteinTotal" class="total-number">0g</div>
          <div class="total-label">Protein</div>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>Base Ingredients</h2>
        
      </div>
      <div id="baseList" class="ingredient-list"></div>
    </section>

    <section class="card">
      <div class="section-head">
        <h2>Mix-ins</h2>
        <button type="button" id="addMixInBtn" class="ghost">+ Add</button>
      </div>
      <div id="mixInList" class="ingredient-list"></div>
    </section>

    <section class="card">
      <h2>Recipe Notes</h2>
      <textarea id="recipeNotes" placeholder="Texture, tweaks, next experiment..."></textarea>

      <div class="button-row">
        <button type="button" id="saveBtn">Save Recipe</button>
        <button type="button" id="clearSavedBtn" class="danger">Clear Saved</button>
      </div>
    </section>

    <section class="card">
      <button type="button" id="resetBtn" class="danger reset-full">Reset Recipe</button>
    </section>

    <section class="card">
      <h2>Saved Recipes</h2>
      <div id="savedList" class="empty">No saved recipes yet.</div>
    </section>
  </main>

  <script src="recipes.js"></script>
  <script src="script.js"></script>
</body>
</html>
